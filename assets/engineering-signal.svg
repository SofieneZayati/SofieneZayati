<svg width="860" height="300" viewBox="0 0 860 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sofiene Zayati Engineering Signal</title>
  <desc id="desc">A timeless summary of Sofiene Zayati's full-stack, artificial intelligence, and connected-systems expertise.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="860" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#0A1620"/>
      <stop offset="1" stop-color="#07131A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="90" y1="10" x2="770" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5FF"/>
      <stop offset="1" stop-color="#5DF2D6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="858" height="298" rx="24" fill="url(#panel)" stroke="#30363D" stroke-width="2"/>
