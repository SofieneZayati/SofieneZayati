<svg width="860" height="260" viewBox="0 0 860 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sofiene Zayati GitHub Signal</title>
  <desc id="desc">Static GitHub signal summary card for Sofiene Zayati profile README.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="860" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#0A1620"/>
      <stop offset="1" stop-color="#07131A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="100" y1="0" x2="760" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5FF"/>
      <stop offset="1" stop-color="#5DF2D6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="858" height="258" rx="24" fill="url(#panel)" stroke="#30363D" stroke-width="2"/>
  <path d="M38 56C95 26 151 25 210 50C289 83 354 82 424 50C509 11 592 24 663 57C728 87 789 83 822 64" stroke="url(#cyan)" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="74" cy="74" r="4" fill="#00F5FF" filter="url(#glow)"/>
  <circle cx="786" cy="63" r="4" fill="#00F5FF" filter="url(#glow)"/>

  <text x="430" y="48" text-anchor="middle" fill="#E6EDF3" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="700">GitHub Signal</text>
  <text x="430" y="74" text-anchor="middle" fill="#8B949E" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13">SofieneZayati · profile activity snapshot</text>

