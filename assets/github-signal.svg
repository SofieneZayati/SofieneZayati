    <path d="M115 0c10 8 8 20 0 26c-8-6-10-18 0-26Z" fill="#00F5FF"/>
    <text x="115" y="69" text-anchor="middle" fill="#E6EDF3" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="32" font-weight="800">2</text>
