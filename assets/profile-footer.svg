<svg width="1200" height="150" viewBox="0 0 1200 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated profile footer</title>
  <desc id="desc">A dark animated neon footer with the phrase build the full system.</desc>
  <defs>
