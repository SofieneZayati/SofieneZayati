      <stop stop-color="#05070A"/>
      <stop offset="0.55" stop-color="#08151D"/>
      <stop offset="1" stop-color="#071A21"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5FF"/>
      <stop offset="0.5" stop-color="#5DF2D6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
