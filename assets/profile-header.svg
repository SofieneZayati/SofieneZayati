<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sofiene Zayati animated developer header</title>
  <desc id="desc">Animated neon profile banner for a full-stack, AI, cloud, and embedded systems developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070A"/>
      <stop offset="0.48" stop-color="#07131A"/>
      <stop offset="1" stop-color="#071A21"/>
    </linearGradient>
    <linearGradient id="neon" x1="130" y1="80" x2="1040" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5FF"/>
      <stop offset="0.52" stop-color="#5DF2D6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
      <animate attributeName="x1" values="130;330;130" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1040;840;1040" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00F5FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00F5FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00F5FF" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#00F5FF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="2" y="2" width="1196" height="356" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="1200" height="360" fill="url(#bg)"/>
    <rect width="1200" height="360" fill="url(#grid)"/>

    <circle cx="105" cy="70" r="120" fill="#00F5FF" fill-opacity="0.05" filter="url(#softGlow)">
      <animate attributeName="r" values="95;135;95" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1090" cy="300" r="145" fill="#8B5CF6" fill-opacity="0.06" filter="url(#softGlow)">
      <animate attributeName="r" values="125;165;125" dur="6.5s" repeatCount="indefinite"/>
    </circle>

    <rect x="-220" y="0" width="220" height="360" fill="url(#scan)" opacity="0.75">
      <animate attributeName="x" values="-220;1200" dur="4.8s" repeatCount="indefinite"/>
    </rect>

    <path d="M70 80H238L275 117H410" stroke="#00F5FF" stroke-opacity="0.27" stroke-width="2"/>
    <path d="M790 245H968L1010 203H1132" stroke="#8B5CF6" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="70" cy="80" r="5" fill="#00F5FF" filter="url(#glow)">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1132" cy="203" r="5" fill="#8B5CF6" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.25;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>

    <g opacity="0.85">
      <rect x="76" y="264" width="168" height="42" rx="21" fill="#08151C" stroke="#00F5FF" stroke-opacity="0.35"/>
      <circle cx="99" cy="285" r="5" fill="#2BE38C">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="114" y="291" fill="#A7B6C2" font-family="JetBrains Mono, Consolas, monospace" font-size="14">SYSTEM ONLINE</text>
    </g>

    <g transform="translate(952 74)">
      <circle cx="70" cy="70" r="50" stroke="#00F5FF" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="7 8">
        <animateTransform attributeName="transform" type="rotate" from="0 70 70" to="360 70 70" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="70" cy="70" r="31" stroke="#8B5CF6" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="4 6">
        <animateTransform attributeName="transform" type="rotate" from="360 70 70" to="0 70 70" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="70" cy="70" r="7" fill="#00F5FF" filter="url(#glow)"/>
      <circle cx="70" cy="20" r="5" fill="#5DF2D6">
        <animateTransform attributeName="transform" type="rotate" from="0 70 70" to="360 70 70" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <text x="600" y="128" text-anchor="middle" fill="#7EEFF4" font-family="JetBrains Mono, Consolas, monospace" font-size="17" letter-spacing="5">FULL-STACK • AI • EMBEDDED</text>
    <text x="600" y="205" text-anchor="middle" fill="url(#neon)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="2" filter="url(#glow)">SOFIENE ZAYATI</text>
    <text x="600" y="248" text-anchor="middle" fill="#B7C4CE" font-family="JetBrains Mono, Consolas, monospace" font-size="17">building complete products from interface to infrastructure</text>
    <rect x="880" y="233" width="11" height="22" rx="2" fill="#00F5FF">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>

    <g opacity="0.75" font-family="JetBrains Mono, Consolas, monospace" font-size="12">
      <text x="80" y="340" fill="#5F7483">01 / WEB</text>
      <text x="282" y="340" fill="#5F7483">02 / CLOUD</text>
      <text x="500" y="340" fill="#5F7483">03 / AI</text>
      <text x="694" y="340" fill="#5F7483">04 / IOT</text>
      <text x="910" y="340" fill="#5F7483">05 / DELIVERY</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="27" stroke="url(#neon)" stroke-width="2"/>
</svg>
